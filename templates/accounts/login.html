{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — VocalTask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">VocalTask</div>
    <p class="auth-tagline">Speak your tasks into existence.</p>

    {% if messages %}
    {% for message in messages %}
    <div class="message message--{{ message.tags }}" style="margin-bottom:1rem">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <h2 class="auth-title">Welcome back</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required placeholder="your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      {% if form.errors %}
      <div class="message message--error" style="margin-bottom:1rem">Invalid username or password.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'accounts:register' %}">Create one</a>
    </div>
  </div>
</div>
</body>
</html>
