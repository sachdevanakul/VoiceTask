{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — VocalTask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">VocalTask</div>
    <p class="auth-tagline">Speak your tasks into existence.</p>

    <h2 class="auth-title">Create your account</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label>{{ field.label }}</label>
        <input
          type="{{ field.field.widget.input_type }}"
          name="{{ field.html_name }}"
          placeholder="{% if field.html_name == 'username' %}choose a username{% elif 'password' in field.html_name %}••••••••{% endif %}"
          {% if field.field.required %}required{% endif %}
          autocomplete="{{ field.html_name }}"
        >
        {% if field.errors %}
        {% for error in field.errors %}
        <div class="form-error">{{ error }}</div>
        {% endfor %}
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;margin-top:0.5rem">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
